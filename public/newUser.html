<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <!-- <script src="script.js" defer></script> -->
</head>
<body>
    <form id="newUserForm">
        <label for="firstname">Firstname:</label>
        <input type="text" id="firstname" name="firstname" required><br>

        <label for="lastname">Lastname:</label>
        <input type="text" id="lastname" name="lastname" required><br>

        <label for="number">Tlf number:</label>
        <input type="text" id="tlf" name="tlf" required><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required minlength="6"><br>
        <p id="demo"></p>

        <button type="submit">Create User</button>
    </form>

    <p><a href="index.html" class="button">Log inn</a></p>

    <script>
    document.getElementById("newUserForm").addEventListener("submit", async function addPerson(event) {
        event.preventDefault();

        const firstname = document.getElementById("firstname").value;
        const lastname = document.getElementById("lastname").value;
        const tlf = document.getElementById("tlf").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        console.log(email)
        const response = await fetch("/newUser", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                firstname,
                lastname,
                tlf,
                email,
                password
            })
            
        });

        const result = await response.json();
        alert(result.message);
        window.location.href='./index.html';
    })

    // function passwordLength() {
    //     document.getElementById("password").maxLength = "6";
    //     document.getElementById("demo").innerHTML = "Maximum number of characters allowed in the password field is now 6.";
    // }
    </script>
</body>
</html>
